ode-off><img alt="Light mode" aria-label="light mode toggle" src="https://vsv.to/light_mode.svg " title="Light mode" class=themed-icon height=24 width=24></button></div><script>const cls = document.body.classList;

  if (getSessionTheme === "dark") {

  window
    .matchMedia("(prefers-color-scheme: dark)")
